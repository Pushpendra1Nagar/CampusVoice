{% extends 'base.html' %}
{% block title %}Delete Complaint{% endblock %}
{% block content %}
<div style="max-width:500px;margin:3rem auto;">
  <div class="card" style="text-align:center;padding:2.5rem;">
    <div style="font-size:3rem;margin-bottom:1rem;">🗑️</div>
    <h1 style="font-size:1.3rem;font-weight:700;margin-bottom:.5rem;">Delete this complaint?</h1>
    <p style="color:var(--text-secondary);margin-bottom:.5rem;">{{ complaint.category_icon }} <strong>{{ complaint.title }}</strong></p>
    <p style="color:var(--danger);font-size:.875rem;margin-bottom:2rem;">This action cannot be undone.</p>
    <form method="post" style="display:flex;gap:1rem;justify-content:center;">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger-solid">Yes, Delete</button>
      <a href="{% url 'complaints:my_complaints' %}" class="btn btn-secondary">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
