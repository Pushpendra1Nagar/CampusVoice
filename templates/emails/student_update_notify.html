<!DOCTYPE html>
<html><head><meta charset="UTF-8"></head>
<body style="font-family:sans-serif;background:#f0f2f9;margin:0;padding:40px 0;">
<div style="max-width:480px;margin:0 auto;background:#fff;border-radius:16px;
     overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.08);">
  <div style="background:linear-gradient(135deg,#2a52e8,#1a3bc0);padding:24px 32px;">
    <h1 style="color:#fff;font-size:18px;margin:0;">📝 Student Added an Update</h1>
  </div>
  <div style="padding:24px 32px;">
    <p>A student has added new information to their complaint.</p>
    <div style="background:#f0f2f9;border-radius:8px;padding:14px 18px;margin:14px 0;">
      <div style="font-weight:700;font-size:14px;margin-bottom:6px;">
        {{ complaint.category_icon }} {{ complaint.title }}
      </div>
      <div style="font-size:13px;color:#666;border-top:1px solid #ddd;padding-top:8px;margin-top:8px;">
        <strong>Student Update:</strong><br>{{ content }}
      </div>
    </div>
    <a href="https://campusvoice-bcw4.onrender.com/staff-dashboard/"
       style="display:block;background:#2a52e8;color:#fff;text-decoration:none;
              text-align:center;padding:12px;border-radius:8px;font-weight:700;margin-top:16px;">
      View in Dashboard →
    </a>
  </div>
  <div style="background:#f8f9fe;padding:14px 32px;text-align:center;
       font-size:12px;color:#999;border-top:1px solid #eee;">
    campusvoice.cms@gmail.com
  </div>
</div>
</body></html>
