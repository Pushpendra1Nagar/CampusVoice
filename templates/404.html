<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — CampusVoice</title>
  <script>(function(){var t=localStorage.getItem('cv-theme');if(t)document.documentElement.setAttribute('data-theme',t);})();</script>
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body>
  <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;
       padding:2rem;background:var(--bg-primary);">
    <div style="text-align:center;max-width:440px;">
      <div style="font-size:5rem;margin-bottom:1rem;">🔍</div>
      <h1 style="font-family:'Space Grotesk',sans-serif;font-size:4rem;
          font-weight:700;color:var(--accent);margin-bottom:.5rem;">404</h1>
      <h2 style="font-size:1.3rem;font-weight:700;margin-bottom:.75rem;">
        Page Not Found
      </h2>
      <p style="color:var(--text-secondary);margin-bottom:2rem;line-height:1.7;">
        The page you're looking for doesn't exist or has been moved.
      </p>
      <div style="display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;">
        <a href="/" style="background:var(--accent);color:#fff;padding:.65rem 1.5rem;
           border-radius:8px;text-decoration:none;font-weight:600;">
          Go to Feed
        </a>
        <a href="/track/" style="background:var(--bg-input);color:var(--text-primary);
           padding:.65rem 1.5rem;border-radius:8px;text-decoration:none;font-weight:600;">
          Track a Complaint
        </a>
      </div>
    </div>
  </div>
</body>
</html>
