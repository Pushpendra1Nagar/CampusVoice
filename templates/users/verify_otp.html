{% extends 'base.html' %}
{% block title %}Verify OTP{% endblock %}
{% block content %}
<div class="auth-container">
  <div class="auth-card" style="text-align:center;">
    <div style="font-size:3rem; margin-bottom:1rem;">📨</div>
    <h1 class="auth-title">Check your email</h1>
    <p class="auth-subtitle">We sent a 6-digit code to <strong>{{ email }}</strong></p>
    <form method="post">
      {% csrf_token %}
      <div class="form-group" style="margin:1.5rem 0;">
        <input type="text" name="otp" class="form-control otp-input"
               placeholder="000000" maxlength="6" inputmode="numeric"
               autocomplete="one-time-code" required autofocus>
      </div>
      <button type="submit" class="btn btn-primary-solid btn-full">Verify & Create Account</button>
    </form>
    <p style="margin-top:1.25rem; font-size:0.875rem; color:var(--text-secondary);">
      Didn't receive it?
      <a href="{% url 'users:resend_otp' %}" style="color:var(--accent);">Resend OTP</a>
    </p>
  </div>
</div>
{% endblock %}
