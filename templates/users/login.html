{% extends 'base.html' %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="auth-container">
  <div class="auth-card">
    <h1 class="auth-title">Welcome back 👋</h1>
    <p class="auth-subtitle">Login to submit or track your complaints.</p>
    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-control" placeholder="your@email.com" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary-solid btn-full" style="margin-top:0.5rem;">Login</button>
    </form>
    <p style="text-align:center; margin-top:1.25rem; font-size:0.875rem; color:var(--text-secondary);">
      Don't have an account? <a href="{% url 'users:register' %}" style="color:var(--accent);">Register here</a>
    </p>
  </div>
</div>
{% endblock %}
