{% extends 'base.html' %}
{% block title %}Change Password{% endblock %}
{% block content %}
<div style="max-width:480px;margin:0 auto;">
  <a href="{% url 'users:profile' %}" style="color:var(--text-secondary);font-size:.875rem;
     text-decoration:none;margin-bottom:1.5rem;display:inline-block;">← Back to Profile</a>

  <h1 style="font-family:'Space Grotesk',sans-serif;font-size:1.4rem;
      font-weight:700;margin-bottom:1.5rem;">Change Password</h1>

  <div class="card">
    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Current Password *</label>
        <input type="password" name="current_password" class="form-control"
               placeholder="Your current password" required>
      </div>
      <div class="form-group">
        <label class="form-label">New Password *</label>
        <input type="password" name="new_password" id="newPwd" class="form-control"
               placeholder="Minimum 8 characters" required minlength="8"
               oninput="checkStrength(this.value)">
        <div id="strengthBar" style="margin-top:.4rem;height:4px;border-radius:4px;
             background:var(--border);transition:all .3s;">
          <div id="strengthFill" style="height:100%;border-radius:4px;width:0%;transition:all .3s;"></div>
        </div>
        <span id="strengthLabel" class="form-help"></span>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm New Password *</label>
        <input type="password" name="confirm_password" id="confirmPwd" class="form-control"
               placeholder="Repeat new password" required
               oninput="checkMatch()">
        <span id="matchLabel" class="form-help"></span>
      </div>
      <button type="submit" class="btn btn-primary-solid btn-full">
        Update Password
      </button>
    </form>
  </div>
</div>

<script>
function checkStrength(pwd) {
  const fill  = document.getElementById('strengthFill');
  const label = document.getElementById('strengthLabel');
  let score = 0;
  if (pwd.length >= 8)  score++;
  if (/[A-Z]/.test(pwd)) score++;
  if (/[0-9]/.test(pwd)) score++;
  if (/[^A-Za-z0-9]/.test(pwd)) score++;
  const levels = [
    { w:'0%',   color:'transparent', text:'' },
    { w:'25%',  color:'#dc2626',     text:'Weak' },
    { w:'50%',  color:'#d97706',     text:'Fair' },
    { w:'75%',  color:'#2a52e8',     text:'Good' },
    { w:'100%', color:'#16a34a',     text:'Strong ✓' },
  ];
  fill.style.width       = levels[score].w;
  fill.style.background  = levels[score].color;
  label.textContent      = levels[score].text;
  label.style.color      = levels[score].color;
}

function checkMatch() {
  const pwd     = document.getElementById('newPwd').value;
  const confirm = document.getElementById('confirmPwd').value;
  const label   = document.getElementById('matchLabel');
  if (!confirm) { label.textContent = ''; return; }
  if (pwd === confirm) {
    label.textContent = '✓ Passwords match';
    label.style.color = '#16a34a';
  } else {
    label.textContent = '✗ Passwords do not match';
    label.style.color = '#dc2626';
  }
}
</script>
{% endblock %}
