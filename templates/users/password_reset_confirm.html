{% extends 'base.html' %}
{% block title %}Enter Reset Code{% endblock %}
{% block content %}
<div class="auth-container">
  <div class="auth-card" style="text-align:center;">
    <div style="font-size:2.5rem;margin-bottom:1rem;">📨</div>
    <h1 class="auth-title">Enter reset code</h1>
    <p class="auth-subtitle">
      We sent a 6-digit code to <strong>{{ email }}</strong>.<br>
      Enter it below along with your new password.
    </p>
    <form method="post" style="text-align:left;">
      {% csrf_token %}
      <div class="form-group" style="margin:1.25rem 0;">
        <label class="form-label">Reset Code</label>
        <input type="text" name="otp" class="form-control otp-input"
               placeholder="000000" maxlength="6"
               inputmode="numeric" autocomplete="one-time-code" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">New Password</label>
        <input type="password" name="new_password" class="form-control"
               placeholder="Minimum 8 characters" required minlength="8">
      </div>
      <div class="form-group">
        <label class="form-label">Confirm New Password</label>
        <input type="password" name="confirm_password" class="form-control"
               placeholder="Repeat new password" required>
      </div>
      <button type="submit" class="btn btn-primary-solid btn-full">
        Reset Password
      </button>
    </form>
    <p style="margin-top:1.25rem;font-size:.875rem;color:var(--text-secondary);">
      Didn't receive the code?
      <a href="{% url 'users:password_reset' %}" style="color:var(--accent);">Try again</a>
    </p>
  </div>
</div>
{% endblock %}
