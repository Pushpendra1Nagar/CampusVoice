{% extends 'base.html' %}
{% block title %}Reset Password{% endblock %}
{% block content %}
<div class="auth-container">
  <div class="auth-card">
    <div style="font-size:2.5rem;text-align:center;margin-bottom:1rem;">🔐</div>
    <h1 class="auth-title">Reset your password</h1>
    <p class="auth-subtitle">Enter your registered email. We'll send you a 6-digit reset code.</p>
    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Registered Email</label>
        <input type="email" name="email" class="form-control"
               placeholder="your@email.com" required autofocus>
      </div>
      <button type="submit" class="btn btn-primary-solid btn-full">
        Send Reset Code
      </button>
    </form>
    <p style="text-align:center;margin-top:1.25rem;font-size:.875rem;color:var(--text-secondary);">
      Remember your password?
      <a href="{% url 'users:login' %}" style="color:var(--accent);">Login</a>
    </p>
  </div>
</div>
{% endblock %}
