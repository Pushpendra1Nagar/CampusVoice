{% extends 'base.html' %}
{% block title %}Register{% endblock %}

{% block content %}
<style>
  /* ---------- container ---------- */
  .register-container {
    max-width: 660px;
    width: 100%;
    margin: 0 auto;
    padding: 1rem 1rem 2rem;
    margin-top: 0;
  }

  .register-card {
    background: var(--card-bg, #fff);
    border: 1px solid var(--border, #e2e8f0);
    border-radius: 1rem;
    padding: 2rem 2.25rem;
    box-shadow: 0 4px 24px rgba(0, 0, 0, .06);
    transition: background 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
  }

  /* ===== DARK MODE OVERRIDES ===== */
  [data-theme="dark"] .register-card {
    background: var(--card-bg, #1e293b);
    border-color: var(--border, rgba(255, 255, 255, 0.06));
    box-shadow: 0 4px 24px rgba(0, 0, 0, .25);
  }

  [data-theme="dark"] .fc {
    background: var(--input-bg, #0f172a);
    border-color: var(--border, rgba(255, 255, 255, 0.1));
    color: var(--text-primary, #f1f5f9);
  }

  [data-theme="dark"] .fc:focus {
    border-color: var(--accent, #818cf8);
    box-shadow: 0 0 0 3px rgba(129, 140, 248, .2);
  }

  [data-theme="dark"] .fc option {
    background: #1e293b;
    color: #f1f5f9;
  }

  [data-theme="dark"] .register-title {
    color: var(--text-primary, #f1f5f9);
  }

  [data-theme="dark"] .register-subtitle {
    color: var(--text-secondary, #94a3b8);
  }

  [data-theme="dark"] .fl {
    color: var(--text-primary, #e2e8f0);
  }

  [data-theme="dark"] .fhelp {
    color: var(--text-secondary, #64748b);
  }

  [data-theme="dark"] .form-divider {
    border-top-color: var(--border, rgba(255, 255, 255, 0.06));
  }

  [data-theme="dark"] .auth-footer {
    color: var(--text-secondary, #94a3b8);
  }

  [data-theme="dark"] .btn-submit {
    background: var(--accent, #818cf8);
  }

  [data-theme="dark"] .btn-submit:hover:not(:disabled) {
    background: var(--accent-hover, #6366f1);
  }

  [data-theme="dark"] .toast-item {
    background: #3b1a1a;
    color: #fca5a5;
    border-left-color: #f87171;
  }

  [data-theme="dark"] .toast-close {
    color: #f87171;
  }

  .register-title {
    font-size: 1.5rem;
    font-weight: 700;
    margin: 0 0 .2rem;
    color: var(--text-primary, #1a202c);
    transition: color 0.3s ease;
  }

  .register-subtitle {
    font-size: .9rem;
    color: var(--text-secondary, #64748b);
    margin: 0 0 1.5rem;
    transition: color 0.3s ease;
  }

  /* ---------- grid ---------- */
  .row-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0 1.25rem;
  }

  /* ---------- form fields ---------- */
  .fg {
    margin-bottom: 1.1rem;
  }

  .fl {
    display: block;
    font-size: .8rem;
    font-weight: 600;
    margin-bottom: .35rem;
    color: var(--text-primary, #1a202c);
    transition: color 0.3s ease;
  }

  .fc {
    width: 100%;
    padding: .5rem .75rem;
    font-size: .875rem;
    border: 1px solid var(--border, #cbd5e1);
    border-radius: .45rem;
    background: var(--input-bg, #f8fafc);
    color: var(--text-primary, #1a202c);
    transition: border-color .2s, box-shadow .2s, background .3s, color .3s;
    box-sizing: border-box;
    font-family: 'Plus Jakarta Sans', sans-serif;
  }

  .fc:focus {
    outline: none;
    border-color: var(--accent, #6366f1);
    box-shadow: 0 0 0 3px rgba(99, 102, 241, .15);
  }

  .fc::placeholder {
    color: var(--text-secondary, #94a3b8);
    opacity: 0.7;
  }

  .fhelp {
    font-size: .72rem;
    color: var(--text-secondary, #94a3b8);
    margin-top: .25rem;
    display: block;
    transition: color 0.3s ease;
  }

  .form-help {
    font-size: .72rem;
    margin-top: .25rem;
    display: block;
    transition: color 0.3s ease;
  }

  /* ---------- divider ---------- */
  .form-divider {
    border: none;
    border-top: 1px solid var(--border, #e9ecef);
    margin: .35rem 0 1.1rem;
    transition: border-color 0.3s ease;
  }

  /* ---------- submit button ---------- */
  .btn-submit {
    width: 100%;
    padding: .65rem 1.25rem;
    font-size: .95rem;
    font-weight: 600;
    border: none;
    border-radius: .5rem;
    cursor: pointer;
    background: var(--accent, #6366f1);
    color: #fff;
    margin-top: .5rem;
    transition: background .2s, transform .1s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: .5rem;
    min-height: 44px;
    font-family: 'Plus Jakarta Sans', sans-serif;
  }

  .btn-submit:hover:not(:disabled) {
    background: var(--accent-hover, #4f46e5);
    transform: translateY(-1px);
  }

  .btn-submit:disabled {
    opacity: .7;
    cursor: not-allowed;
  }

  .btn-spinner {
    width: 16px;
    height: 16px;
    border: 2.5px solid rgba(255, 255, 255, .3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin .55s linear infinite;
    flex-shrink: 0;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ---------- password strength bar ---------- */
  .pwd-bar-track {
    height: 4px;
    background: var(--border, #e2e8f0);
    border-radius: 4px;
    margin-top: .4rem;
    overflow: hidden;
    transition: background 0.3s ease;
  }

  [data-theme="dark"] .pwd-bar-track {
    background: rgba(255, 255, 255, 0.1);
  }

  .pwd-bar-fill {
    height: 100%;
    border-radius: 4px;
    width: 0%;
    transition: all .3s;
  }

  /* ---------- footer ---------- */
  .auth-footer {
    text-align: center;
    margin-top: 1.25rem;
    font-size: .85rem;
    color: var(--text-secondary, #64748b);
    transition: color 0.3s ease;
  }

  .auth-footer a {
    color: var(--accent, #6366f1);
    font-weight: 600;
    text-decoration: none;
  }

  .auth-footer a:hover { text-decoration: underline; }

  [data-theme="dark"] .auth-footer a {
    color: var(--accent, #818cf8);
  }

  /* ---------- responsive ---------- */
  @media (max-width: 640px) {
    .register-card { padding: 1.5rem 1.15rem; }
    .row-2 { grid-template-columns: 1fr; }
  }
</style>

<!-- ==================== FORM ==================== -->
<div class="register-container">
  <div class="register-card">
    <h1 class="register-title">Create your account</h1>
    <p class="register-subtitle">Join CampusVoice — it only takes a minute</p>

    <form method="post" novalidate id="regForm">
      {% csrf_token %}

      <div class="row-2">
        <div class="fg">
          <label class="fl">First Name *</label>
          <input type="text" name="first_name" class="fc"
                 placeholder="First name"
                 value="{{ form.first_name.value|default:'' }}" required>
        </div>
        <div class="fg">
          <label class="fl">Last Name *</label>
          <input type="text" name="last_name" class="fc"
                 placeholder="Last name"
                 value="{{ form.last_name.value|default:'' }}" required>
        </div>
      </div>

      <div class="row-2">
        <div class="fg">
          <label class="fl">Email *</label>
          <input type="email" name="email" class="fc"
                 placeholder="you@example.com"
                 value="{{ form.email.value|default:'' }}" required>
          <span class="fhelp">An OTP will be sent to verify your email.</span>
        </div>
        <div class="fg">
          <label class="fl">Username *</label>
          <input type="text" name="username" class="fc"
                 placeholder="Choose a username"
                 value="{{ form.username.value|default:'' }}" required>
        </div>
      </div>

      <hr class="form-divider">

      <div class="row-2">
        <div class="fg">
          <label class="fl">Enrollment Number *</label>
          <input type="text" name="roll_number" class="fc"
                 placeholder="XX0000000000"
                 pattern="[A-Z]{2}[0-9]{10}"
                 title="Must be 2 capital letters followed by 10 digits"
                 maxlength="12" minlength="12"
                 oninput="this.value = this.value.toUpperCase()"
                 value="{{ form.roll_number.value|default:'' }}" required>
          <span id="enrollHint" class="form-help"></span>
          <span class="fhelp">2 letters + 10 digits (e.g. XX0000000000)</span>
        </div>
        <div class="fg">
          <label class="fl">Department</label>
          <input type="text" name="department" class="fc"
                 placeholder="e.g. Computer Science"
                 value="{{ form.department.value|default:'' }}">
        </div>
      </div>

      <div class="row-2">
        <div class="fg">
          <label class="fl">Year of Study *</label>
          <select name="year_of_study" class="fc" required>
            <option value="">— Select Year —</option>
            <option value="1" {% if form.year_of_study.value == '1' %}selected{% endif %}>1st Year</option>
            <option value="2" {% if form.year_of_study.value == '2' %}selected{% endif %}>2nd Year</option>
            <option value="3" {% if form.year_of_study.value == '3' %}selected{% endif %}>3rd Year</option>
            <option value="4" {% if form.year_of_study.value == '4' %}selected{% endif %}>4th Year</option>
          </select>
        </div>
        <div class="fg">
          <label class="fl">Degree Program *</label>
          <select name="degree" class="fc" required>
            <option value="">— Select Degree —</option>
            <option value="bachelor" {% if form.degree.value == 'bachelor' %}selected{% endif %}>Bachelors</option>
            <option value="master" {% if form.degree.value == 'master' %}selected{% endif %}>Masters</option>
            <option value="phd" {% if form.degree.value == 'phd' %}selected{% endif %}>PhD / Research</option>
            <option value="diploma" {% if form.degree.value == 'diploma' %}selected{% endif %}>Diploma</option>
          </select>
        </div>
      </div>

      <hr class="form-divider">

      <div class="row-2">
        <div class="fg">
          <label class="fl">Password *</label>
          <input type="password" name="password1" class="fc"
                 placeholder="Create a password" required>
          <div class="pwd-bar-track">
            <div id="pwdFill" class="pwd-bar-fill"></div>
          </div>
          <span id="pwdLabel" class="form-help"></span>
        </div>
        <div class="fg">
          <label class="fl">Confirm Password *</label>
          <input type="password" name="password2" class="fc"
                 placeholder="Re-enter password" required>
          <span id="matchLabel" class="form-help"></span>
        </div>
      </div>

      <button type="submit" class="btn-submit" id="submitBtn">
        <span id="btnLabel">Send OTP &amp; Continue →</span>
      </button>
    </form>

    <p class="auth-footer">
      Already registered?&nbsp;<a href="{% url 'users:login' %}">Login</a>
    </p>
  </div>
</div>

<!-- ==================== JS ==================== -->
<script>
(function() {
  /* ===== Enrollment number validation ===== */
  var rollInput = document.querySelector('input[name="roll_number"]');
  if (rollInput) {
    rollInput.addEventListener('input', function() {
      var val  = this.value.toUpperCase();
      this.value = val;
      var valid = /^[A-Z]{2}[0-9]{10}$/.test(val);
      var hint  = document.getElementById('enrollHint');
      if (!hint) return;
      if (val.length === 0) {
        hint.textContent = '';
      } else if (valid) {
        hint.textContent = '✅ Valid enrollment number';
        hint.style.color = 'var(--success, #10b981)';
      } else {
        hint.textContent = '❌ Format: 2 letters + 10 digits (' + val.length + '/12)';
        hint.style.color = 'var(--danger, #ef4444)';
      }
    });
  }

  /* ===== Password strength ===== */
  var pwd1Input = document.querySelector('input[name="password1"]');
  if (pwd1Input) {
    pwd1Input.addEventListener('input', function() {
      var pwd   = this.value;
      var score = 0;
      if (pwd.length >= 8)          score++;
      if (/[A-Z]/.test(pwd))        score++;
      if (/[0-9]/.test(pwd))        score++;
      if (/[^A-Za-z0-9]/.test(pwd)) score++;

      var levels = [
        { text: '',          color: 'transparent' },
        { text: 'Weak',      color: 'var(--danger, #ef4444)'  },
        { text: 'Fair',      color: 'var(--warning, #f59e0b)' },
        { text: 'Good',      color: 'var(--info, #3b82f6)'    },
        { text: 'Strong ✓',  color: 'var(--success, #10b981)' }
      ];

      var fill  = document.getElementById('pwdFill');
      var label = document.getElementById('pwdLabel');
      if (fill) {
        fill.style.width      = (score * 25) + '%';
        fill.style.background = levels[score].color;
      }
      if (label) {
        label.textContent = pwd.length > 0 ? levels[score].text : '';
        label.style.color = levels[score].color;
      }
    });
  }

  /* ===== Password confirm match ===== */
  var pwd2Input = document.querySelector('input[name="password2"]');
  if (pwd2Input) {
    pwd2Input.addEventListener('input', function() {
      var p1    = document.querySelector('input[name="password1"]');
      var label = document.getElementById('matchLabel');
      if (!label) return;
      if (!this.value) { label.textContent = ''; return; }
      if (p1 && p1.value === this.value) {
        label.textContent = '✅ Passwords match';
        label.style.color = 'var(--success, #10b981)';
      } else {
        label.textContent = '❌ Passwords do not match';
        label.style.color = 'var(--danger, #ef4444)';
      }
    });
  }

  /* ===== Button loading state ===== */
  var form = document.getElementById('regForm');
  var btn  = document.getElementById('submitBtn');
  var lbl  = document.getElementById('btnLabel');

  if (form && btn && lbl) {
    form.addEventListener('submit', function() {
      btn.disabled  = true;
      lbl.innerHTML = '<span class="btn-spinner"></span> Please wait a moment…';
    });
  }
})();
</script>
{% endblock %}
