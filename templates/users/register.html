{% extends 'base.html' %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="auth-container" style="max-width:520px;">
  <div class="auth-card">
    <h1 class="auth-title">Create your account</h1>
    <p class="auth-subtitle">Join CampusVoice — your identity stays anonymous on the public feed.</p>
    <form method="post" novalidate>
      {% csrf_token %}
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
        <div class="form-group">
          <label class="form-label">First Name</label>
          <input type="text" name="first_name" class="form-control" placeholder="first name" required>
        </div>
        <div class="form-group">
          <label class="form-label">Last Name</label>
          <input type="text" name="last_name" class="form-control" placeholder="last name" required>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-control" placeholder="Write your email" required>
        <span class="form-help">An OTP will be sent to verify your email.</span>
      </div>
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" placeholder="" required>
      </div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
        <div class="form-group">
          <label class="form-label">Roll Number</label>
          <input type="text" name="roll_number" class="form-control" placeholder="">
        </div>
        <div class="form-group">
          <label class="form-label">Department</label>
          <input type="text" name="department" class="form-control" placeholder="">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password1" class="form-control" placeholder="" required>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <input type="password" name="password2" class="form-control" placeholder="" required>
      </div>
      <button type="submit" class="btn btn-primary-solid btn-full">Send OTP & Continue →</button>
    </form>
    <p style="text-align:center; margin-top:1.25rem; font-size:0.875rem; color:var(--text-secondary);">
      Already registered? <a href="{% url 'users:login' %}" style="color:var(--accent);">Login</a>
    </p>
  </div>
</div>
{% endblock %}
